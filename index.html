    <!-- Google tag (gtag.js) — deferred until first user interaction or 5s idle.
         GTM is 172KB (68KB unused) — keeping it off the critical path keeps
         LCP/FCP clean and shaves ~70KB from the early-load budget. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V3DVZ8RNN6');
      (function () {
        var loaded = false;
        function loadGtag() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-V3DVZ8RNN6';
          document.head.appendChild(s);
        }
        var events = ['pointerdown', 'keydown', 'scroll', 'touchstart'];
        function trigger() {
          events.forEach(function (e) { window.removeEventListener(e, trigger, { passive: true }); });
          loadGtag();
        }
        events.forEach(function (e) { window.addEventListener(e, trigger, { passive: true, once: true }); });
        // Fallback: load after 5s idle so non-interacting visits still report.
        var ric = window.requestIdleCallback;
        if (ric) ric(loadGtag, { timeout: 5000 });
        else setTimeout(loadGtag, 5000);
      })();
    </script>

    <!-- Theme boot — set data-theme before paint to avoid FOUC (default: dark) -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('arcadedeck-theme');
          var theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
