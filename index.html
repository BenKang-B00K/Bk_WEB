<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Making Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="arc">My Game Making Journey</h1>
    <div class="floating-text">
        <a href="https://gate-of-hell.pages.dev/" target="_blank">'Gate of Hell : 악령들의 귀환'</a>
    </div>
    <BR></BR>
    <div class="floating-text-2">
        <a href="https://ultimategamingmode.itch.io/galaxy-launch-infinite-fleet" target="_blank">'Galaxy Launch: Infinite Fleet'</a>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/arcntext/0.1.0/arcntext.min.js"></script>
    <script>
        const arc = document.querySelector('.arc');
        const arctext = new ArcText(arc);
        arctext.arc(200);

        window.addEventListener('load', function() {
            const links = Array.from(document.querySelectorAll('.floating-text, .floating-text-2'));
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const avoidanceRadius = 200; // Adjust as needed
            const placedLinks = [];

            function isOverlapping(x, y, width, height) {
                // Check for overlap with the central avoidance zone
                const distance = Math.sqrt(Math.pow(x + width/2 - centerX, 2) + Math.pow(y + height/2 - centerY, 2));
                if (distance < (avoidanceRadius + Math.max(width, height)/2)) {
                    return true;
                }

                // Check for overlap with other links
                for (const placed of placedLinks) {
                    if (x < placed.x + placed.width &&
                        x + width > placed.x &&
                        y < placed.y + placed.height &&
                        y + height > placed.y) {
                        return true;
                    }
                }

                return false;
            }

            function setRandomPosition(element) {
                let x, y;
                const linkWidth = element.offsetWidth;
                const linkHeight = element.offsetHeight;
                let tries = 0; // prevent infinite loop

                do {
                    x = Math.random() * (window.innerWidth - linkWidth);
                    y = Math.random() * (window.innerHeight - linkHeight);
                    tries++;
                    if(tries > 100) { // If we can't find a position after 100 tries, just break.
                        console.log("Could not find non-overlapping position for a link.");
                        break;
                    }
                } while (isOverlapping(x, y, linkWidth, linkHeight));

                element.style.left = `${x}px`;
                element.style.top = `${y}px`;
                placedLinks.push({x: x, y: y, width: linkWidth, height: linkHeight});
            }

            links.forEach(link => {
                setRandomPosition(link);
            });
        });
    </script>
</body>
</html>
