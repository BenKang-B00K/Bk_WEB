name: Monthly Leaderboard Archive

on:
  # 03:00 UTC = 12:00 KST  |  days 28-31 = covers every month's last day
  schedule:
    - cron: '0 3 28-31 * *'
  # Manual trigger for testing (Actions → Run workflow)
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit & push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install firebase-admin --no-save

      - name: Run archive script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/archive-month.js

      - name: Commit and push if HallOfFame.tsx changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/HallOfFame.tsx
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: archive monthly leaderboard ($(date +'%B %Y'))"
            git push
          )
